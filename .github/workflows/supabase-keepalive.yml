name: Supabase keepalive

on:
  schedule:
    # Every 3 days at 03:00 UTC — well inside Supabase's 7-day free-tier
    # inactivity window, so the project never gets a chance to auto-pause.
    - cron: "0 3 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keepalive endpoint
        run: |
          curl -f -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://tamak.in/api/cron/keepalive
